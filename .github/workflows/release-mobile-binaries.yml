name: Release Mobile Binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        default: mobile-binaries
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-mobile-binaries
  cancel-in-progress: false

jobs:
  android:
    name: Android ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - x86_64

    steps:
      - name: Checkout wrapper
        uses: actions/checkout@v4

      - name: Checkout native JME
        uses: actions/checkout@v4
        with:
          repository: jayeshmepani/jpl-ephemeris
          path: native

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Prepare vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          echo "VCPKG_EXE=$RUNNER_TEMP/vcpkg/vcpkg" >> "$GITHUB_ENV"

      - name: Build Android libraries
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_EXE: ${{ env.VCPKG_EXE }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          JME_SOURCE_PATH: ${{ github.workspace }}/native
        run: ./scripts/build_android_libs.sh

      - name: Package Android artifact
        run: |
          mkdir -p dist
          tar -czf "dist/jme-android-${{ matrix.abi }}.tar.gz" -C "android/src/main/jniLibs/${{ matrix.abi }}" .

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: jme-android-${{ matrix.abi }}
          path: dist/jme-android-${{ matrix.abi }}.tar.gz
          if-no-files-found: error

  ios:
    name: iOS xcframework
    runs-on: macos-14

    steps:
      - name: Checkout wrapper
        uses: actions/checkout@v4

      - name: Checkout native JME
        uses: actions/checkout@v4
        with:
          repository: jayeshmepani/jpl-ephemeris
          path: native

      - name: Prepare vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          echo "VCPKG_EXE=$RUNNER_TEMP/vcpkg/vcpkg" >> "$GITHUB_ENV"

      - name: Build iOS xcframework
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_EXE: ${{ env.VCPKG_EXE }}
        run: ./scripts/build_ios_xcframework.sh native

      - name: Package iOS artifact
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "ios/Frameworks" "dist/jme-ios-frameworks.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: jme-ios-frameworks
          path: dist/jme-ios-frameworks.zip
          if-no-files-found: error

  release:
    name: Publish mobile binary release
    needs:
      - android
      - ios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout wrapper
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Mobile runtime binaries for `jpl_moshier_ephemeris_dart`.

          Artifacts:

          - `jme-android-arm64-v8a.tar.gz`
          - `jme-android-x86_64.tar.gz`
          - `jme-ios-frameworks.zip`

          Notes:

          - Android artifacts contain generated `libjme.so` and bundled `libcalceph.so*` binaries for the supported ABIs.
          - The iOS artifact contains both `Jme.xcframework` and `Calceph.xcframework` for device and simulator builds.
          - These mobile binaries are built with CALCEPH enabled so Flutter can use `ENGINE=JPL` with a real kernel.
          EOF

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" \
              --title "Mobile Runtime Binaries" \
              --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "Mobile Runtime Binaries" \
              --notes-file release-notes.md
          fi
