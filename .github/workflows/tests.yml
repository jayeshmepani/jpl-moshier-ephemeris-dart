name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-host:
    name: Host tests on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout native JME
        uses: actions/checkout@v4
        with:
          repository: jayeshmepani/jpl-ephemeris
          path: native

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Prepare vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          echo "VCPKG_EXE=$RUNNER_TEMP/vcpkg/vcpkg" >> "$GITHUB_ENV"

      - name: Build Android JNI libraries
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_EXE: ${{ env.VCPKG_EXE }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          JME_SOURCE_PATH: ${{ github.workspace }}/native
        run: ./scripts/build_android_libs.sh

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Publish dry-run
        run: flutter pub publish --dry-run

  macos-host:
    name: Host tests on macOS
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  windows-host:
    name: Host tests on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  ios-package:
    name: iOS packaging on macOS
    runs-on: macos-14

    steps:
      - name: Checkout wrapper
        uses: actions/checkout@v4

      - name: Checkout native JME
        uses: actions/checkout@v4
        with:
          repository: jayeshmepani/jpl-ephemeris
          path: native

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          echo "VCPKG_EXE=$RUNNER_TEMP/vcpkg/vcpkg" >> "$GITHUB_ENV"

      - name: Build iOS xcframework
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_EXE: ${{ env.VCPKG_EXE }}
        run: ./scripts/build_ios_xcframework.sh native

      - name: Restore tracked xcframework metadata
        run: |
          git checkout -- \
            ios/Frameworks/Calceph.xcframework/Info.plist \
            ios/Frameworks/Jme.xcframework/Info.plist

      - name: Verify xcframework exists
        run: |
          test -d ios/Frameworks/Jme.xcframework
          test -d ios/Frameworks/Calceph.xcframework

      - name: Publish dry-run
        run: flutter pub publish --dry-run
