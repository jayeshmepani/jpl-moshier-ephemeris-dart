name: jpl_moshier_ephemeris_dart
description: "Pure Dart FFI wrapper for the JPL Moshier Ephemeris native library with direct jme_* API access for Android and iOS."
version: 1.0.0
homepage: https://github.com/jayeshmepani/jpl-moshier-ephemeris-dart
repository: https://github.com/jayeshmepani/jpl-moshier-ephemeris-dart
issue_tracker: https://github.com/jayeshmepani/jpl-moshier-ephemeris-dart/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  ffi: ^2.1.2
  flutter:
    sdk: flutter

dev_dependencies:
  ffigen: ^11.0.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^5.1.0

flutter:
  plugin:
    platforms:
      android:
        package: com.jayeshmepani.jpl_moshier_ephemeris_dart
        pluginClass: JplMoshierEphemerisDartPlugin
      ios:
        pluginClass: JplMoshierEphemerisDartPlugin
